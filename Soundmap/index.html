<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Markham Sound Map</title>

        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <link rel="stylesheet" href="css.css" />

    </head>

    <script src="soundmap.js"></script>
    <body>
    
        <header>
            <header class="top-bar">
                <h1> Markham Sound Map</h1>
                <span class="menu-button" id="menuButton">*</span>
                <div class="menu-container" id="menuContainer">
              <a href="#" onclick="showHome()">Home</a>
              <a href="#" onclick="showAbout()">About</a>
        </div>
            </header>
        </header>

        <!-- About -->
        <section id="about-section" style="display:none;"> 
            <h1>About This Project</h1>
            <p>This sound map archives and explores environments through audio.</p>
            <div id="about-page">

                <button id="close-about">X</button>
            
                <h1>Markham Sound Map — Recordings</h1>
            
                <div class="sheet-container">
                    <iframe 
                    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSPbm0gtPWa5UHsVOb_TJf_rc4i6rsZSGNAHdXhn0qCiPMe4egMO-MmvHattgwpJmc6gKrsIb6y2RBO/pubhtml?widget=true&headers=false">
                    </iframe>
                </div>
            
                <div class="form-container">
                    <h2>Submit a Recording</h2>
                    <form>
                        <input type="text" placeholder="Location Name" required>
                        <input type="text" placeholder="Description">
                        <input type="file" accept="audio/*">
                        <button type="submit">Submit</button>
                    </form>
                </div>
            
            </div>
        </section>

        <!-- Home -->
        <section id="home-section"> 
            <h2>Archives of Sounds</h2>
            <iframe class="map" allowfullscreen allow="geolocation" src="//umap.openstreetmap.fr/en/map/sound-map_1363754?scaleControl=false&miniMap=false&scrollWheelZoom=false&zoomControl=true&editMode=disabled&moreControl=true&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=none&captionBar=false&captionMenus=true"></iframe>
        </section>
    </body>
</html>
