<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markham Sound Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" crossorigin=""/>
  <link rel="stylesheet" href="css.css">
</head>
<body>


  <div id="intro-popup" class="intro-popup">
    <div class="intro-bg"></div>
    <div class="intro-content">
      <h1 class="main-title">Markham</h1>
      <div class="dot-field">
        <span class="dot s1">s</span><span class="dot s2">o</span><span class="dot s3">u</span><span class="dot s4">n</span><span class="dot s5">d</span>
        <span class="dot m1">m</span><span class="dot m2">a</span><span class="dot m3">p</span>
      </div>
  
      <div class="enter-wrapper">
        <button id="start-map" class="intro-btn" onclick="showSection('home')">(map)</button>
        <button class="intro-btn" onclick="showSection('about')">(about)</button>        
        <button class="intro-btn" onclick="showSection('submission')">(submit)</button>     
      </div>
   </div>
 </div>

<button id="about-btn">About</button>
<button id="submit-btn">Submit</button>
  <main> 
    <section id="map-page" style="display:none;">
      <button class="back-home-btn" onclick="showSection('intro-popup')">(home)</button>
    </section>
    

    <div id="map"></div>

      <div class="sound-browser" id="soundBrowser">
    <button class="toggle-btn" onclick="toggleBrowser()">☰</button>
    

    <div class="browser-content">
      <h3>Filter Sound</h3>

      <div class="filters">
        <select id="timeFilter" onchange="filterSounds()">
          <option value="all">ANY TIME</option>
          <option value="morning">MORNING</option>
          <option value="afternoon">AFTERNOON</option>
          <option value="evening">EVENING</option>
      </select>
    
      <select id="categoryFilter" onchange="filterSounds()">
        <option value="all">ANY CATEGORY</option>
        <option value="Transit">TRANSIT</option>
        <option value="Commercial">COMMERCIAL</option>
        <option value="Residential">RESIDENTIAL</option>
    </select>
  </div>
      <div class="browser-header">
         
        <div id="soundList" class="sound-list"></div>
      </div>
    </div>
  </section>
</main>
    <div>
 </div>


 <body>
  

  <div class="map-navigation">
    <button onclick="showSection('intro-popup')">( Home )</button>
    <button onclick="showSection('about-page')">( About )</button>
    <button onclick="showSection('submission-page')">( Submit )</button>
  </div>


  <section id="about-page">
    <div class="map-navigation">
      <button onclick="showSection('intro-popup')">( Home )</button>
      <button onclick="showSection('map-page')">( Map )</button>
      <button onclick="showSection('submission-page')">( Submit )</button>
      
    </div>
    <div class="about-content">
      <h2>About the Project</h2>
      <p>Created as part of my studies at OCAD University.</p>
      <button class="back-btn" onclick="showSection('map-page')">← Back to Map</button>
    </div>
  </section>
 
  <!-- ── SUBMISSION ── -->
  <section id="submission-page">
    <div class="map-navigation">
      <button onclick="showSection('intro-popup')">( Home )</button>
      <button onclick="showSection('map-page')">( Map )</button>
      <button onclick="showSection('about-page')">( About )</button>
    </div>
    <div class="about-content">
      <h2>Submit a Sound</h2>
      <p>Upload your recording here.</p>
      <button class="back-btn" onclick="showSection('map-page')">← Back to Map</button>
    </div>
  </section>

  
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.21/leaflet-maplibre-gl.js"></script>
  <script src="soundmap.js"></script>
</body>
