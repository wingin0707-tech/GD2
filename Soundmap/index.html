<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markham Sound Map</title>


  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>


  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" crossorigin=""/>


  <link rel="stylesheet" href="css.css">
</head>
<body>


<header class="top-bar">
  <div class="header-container">
    <div class="title" onclick="showSection('home')">Markham Sound Map</div>
    <nav class="top-nav">
      <button onclick="showSection('home')">HOME</button>
      <button onclick="showSection('about')">ABOUT</button>
      <button onclick="showSection('submission')">SUBMIT</button>
      <div id="bg-image"></div></nav>
  </div>
</header>



  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div id="intro-popup" class="intro-popup">
    <div class="intro-bg"></div>
  
    <div class="intro-content">
      <h1 class="intro-title">
        Markham<br>
        Sound Map
      </h1>
  
      <p class="intro-sub">
        Acoustic archive in development
      </p>
  
      <button id="start-map" class="intro-btn">
        Enter
      </button>
    </div>
  </div>

  <main>
    
     <section id="home" class="active">

            <div id="map"></div>
    </section>

    <section id="about">
      <h1>About This Project</h1>
      <p>This sound map archives and explores environments through audio recordings collected across Markham.</p>
    </section>

    <section id="submission">
      <h2>Submit a Recording</h2>
      <form>
        <input type="text" placeholder="Location Name" required><br>
        <input type="text" placeholder="Description"><br>
        <input type="text" placeholder="Time"><br>
        <input type="file" accept="audio/*"><br>
        <button type="submit">Submit</button>
      </form>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" crossorigin></script>
  <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.21/leaflet-maplibre-gl.js" crossorigin></script>
  <script src="soundmap.js"></script>

</body>
</html>
