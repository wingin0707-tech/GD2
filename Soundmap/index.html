<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markham Sound Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link rel="stylesheet" href="css.css">
</head>
<body class="landing-state">

  <div class="custom-cursor"></div>

  <header class="header-container" id="main-header">
    <h1 class="title" onclick="dissolveHeader()">Markham<br>Sounds<br>Map</h1>
  </header>

  <nav class="top-nav">
    <button onclick="showSection('about')">(about)</button>
    <button onclick="showSection('home')">(home)</button>
    <button onclick="showSection('submission')">(submission)</button>
  </nav>

  <div id="intro-popup" class="intro-popup">
    <div class="intro-content">
      <h1 class="intro-title flowy-text">
        MARKHAM<br>SOUND<br>MAP
      </h1>
      <div class="enter-wrapper">
        <button id="start-map" class="intro-btn">[ ENTER ARCHIVE ]</button>
      </div>
    </div>
  </div>

  <main>
    <section id="home" class="active">
      <div id="map"></div>
    </section>

    <section id="about">
      <div class="content-wrapper">
        <h1>About This Project</h1>
        <p>This sound map archives and explores environments through audio recordings collected across Markham.</p>
        <button class="close-btn" onclick="showSection('home')">→ Back to Map</button>
      </div>
    </section>

    <section id="submission">
      <div class="content-wrapper">
        <h2>Submit a Recording</h2>
        <form action="https://formspree.io/f/your@email.com" method="POST" enctype="multipart/form-data">
          <input type="text" name="location" placeholder="Location Name" required>
          <input type="text" name="description" placeholder="Description">
          <input type="text" name="time" placeholder="Time Recorded">
          <div class="file-input">
            <label>Upload Audio File:</label>
            <input type="file" name="upload" accept="audio/*">
          </div>
          <button type="submit" class="submit-btn">Send Submission</button>
        </form>
        <button class="close-btn" onclick="showSection('home')">→ Back to Map</button>
      </div>
    </section>
  </main>
  
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="soundmap.js"></script>
</body>
</html>
