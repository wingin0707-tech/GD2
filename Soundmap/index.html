<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Markham Sound Map</title>

        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <link rel="stylesheet" href="css.css" />

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="soundmap.js"></script>
    </head>


    <body>
    
        <header>
            <header class="top-bar">
                <h1> Markham Sound Map</h1>
                <nav>
                    <a href="#" onclick="showHome()">Home</a>
                    <a href="#" onclick="showAbout()">About</a>
                </nav>
            </header>
        </header>

        <!-- About -->
        <section id="about-section" style="display:none;"> 
            <h1>About This Project</h1>
            <p>This sound map archives and explores environments through audio.</p>
        </section>

        <!-- Home -->
        <section id="home-section"> 
            <h2>Archives of Sounds</h2>
            <iframe class="map" allowfullscreen allow="geolocation" src="//umap.openstreetmap.fr/en/map/sound-map_1363754?scaleControl=false&miniMap=false&scrollWheelZoom=false&zoomControl=true&editMode=disabled&moreControl=true&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=none&captionBar=false&captionMenus=true"></iframe>
        </section>
    </body>
</html>
